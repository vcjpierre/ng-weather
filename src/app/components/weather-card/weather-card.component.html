@if (weather) {
  <div class="forecast-row">
    <span class="day-label">{{ dayName }}</span>
    <span class="fc-icon">
      <app-weather-icon [code]="weather.id"></app-weather-icon>
    </span>
    <span class="fc-temp fc-high">{{ weather.minMaxTemp?.max | number:'1.0-0' }}°</span>
    <div class="range-track">
      <div class="range-fill" [style.left.%]="rangeLeft" [style.width.%]="rangeWidth"></div>
    </div>
    <span class="fc-temp fc-low">{{ weather.minMaxTemp?.min | number:'1.0-0' }}°</span>
  </div>
}
