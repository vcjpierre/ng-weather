@if (forecastService.weather$ | async; as days) {
  @if (days.length) {
    <div class="forecast">
      <p class="forecast-heading">5-day outlook</p>
      @for (weather of days; track $index) {
        <app-weather-card [weather]="weather" [index]="$index"></app-weather-card>
      }
    </div>
  }
}
